            .language-contract-wrapper {
                text-align: center;
                padding: 7% 3.5%;
                color: #1B1D21;
                background: url(../images/bg-contract.png);
                min-height: 100vh;
                background-size: cover;
               
            }

             .language-contract-wrapper h2{
                margin: 0 0 30px;
             }
            .contract-box {
                text-align: center;
                color: black;
            }
            .language-contract-wrapper .contract-box {
                position: relative;
                margin: 0 0 120px;
            }
            span {
                text-decoration: none;
                color: black;
            }
            a {
                text-decoration: none;
            }
            .language-contract-wrapper .contract-box .col .cont-lang-box {
                padding: 20px;
                border-radius: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                box-shadow: 2px 3px 9px 0px rgba(0, 0, 0, 0.15);
                -webkit-box-shadow: 2px 3px 9px 0px rgba(0, 0, 0, 0.15);
                -moz-box-shadow: 2px 3px 9px 0px rgba(0,0,0,0.15);
            }
            .language-contract-wrapper a {
                text-decoration: none;
                color: #1B1D21;
                cursor: pointer;
            }
            .language-contract-wrapper .contract-box .col {
                max-width: 300px;
                min-width: 300px;
            }
            .language-contract-wrapper .lang-box.contract-box .col {
                max-width: 180px;
                min-width: 180px;
                margin: 0 0 30px;
            }
            .language-contract-wrapper .contract-box .row {
                align-items: center;
                justify-content: center;
            }
            .text-center {
                text-align: center !important;
                font: 31px / 35px 'Sakkal-Majalla-Bold';
            }
            .language-contract-wrapper .lang-box.contract-box .col .cont-lang-box .lang-name {
                display: block;
                margin: 5px 0;
                font: 31px/35px 'Sakkal-Majalla-Bold';
            }
            .language-contract-wrapper .lang-box.contract-box .col img {
                max-width: 60px;
            }
            .language-contract-wrapper a img {
                width: 120px;
                height: auto;
            }
            .language-contract-wrapper .container {

            }

            .language-contract-wrapper .contract-box:after
 {
    content: "";
    background: #ededed;
    position: absolute;
    left: 50%;
    bottom: -70px;
    height: 3px;
    width: 200px;
    margin: 0 0 0 -100px;
}
            @media (min-width: 992px) {
                .container, .container-lg, .container-md, .container-sm {

                }
            }
            @media (min-width: 768px) {
                .container, .container-md, .container-sm {
                    max-width: 720px;
                }
            }
            @media (min-width: 576px) {
                .container, .container-sm {
                    max-width: 540px;
                }
            }

        <script>

            function openYouTubeVideo(videoUrl) {
                window.location.href = videoUrl;
            }

            function PreviewYouTubeVideo(videoUrl) {
                var url = videoUrl.replace("watch?v=", "embed/");
                document.getElementById('videoFrame').src = url;
            }

           function showContractModal() {
                var myModal = new bootstrap.Modal(document.getElementById('ContractPreview'));
                myModal.show();
            }

            function hideContractModal() {
                var modalEl = document.getElementById('ContractPreview');
                var modalInstance = bootstrap.Modal.getInstance(modalEl);
                if (modalInstance) {
                    modalInstance.hide();
                }
            }

            function PreviewContract(contractURL) {
                try{
                const _url = `https://file-um64.onrender.com/api/download/defoult`;

                var a = document.createElement('a');
                a.href = _url;
                a.download = 'contract.pdf';
                document.body.appendChild(a);
                a.click();
                a.remove();
                }
                catch(err)
                {
                    console.error("Download failed:", err);
                }
            }

            $(document).ready(function () {
                $('#VideoPreview').on('hide.bs.modal', () => {
                    $('#videoFrame').attr('src', '');
                });
            });
